<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>월급 루팡</title>
    <link rel="icon" type="image/x-icon" href="./assets/favicon/favicon.ico" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/reset-css@4.0.1/reset.min.css"
    />
    <link rel="stylesheet" href="./style/global.css" />
    <link rel="stylesheet" href="./style/common.css" />
    <link rel="stylesheet" href="./style/sidebar.css" />
    <link rel="stylesheet" href="./style/home-page.css" />
  </head>
  <body>
    <div id="main">
      <div id="sidebar">
        <div class="home">
          <img class="logo" src="./assets/logo/logo.png" />
          <div class="xx-large bold">월급 루팡</div>
        </div>

        <div class="menu-bar">
          <div class="x-large bold">게임</div>

          <div class="menu">
            <img src="./assets/logo/trump-card-clover-black.svg" />
            <div class="large">프리셀</div>
          </div>

          <div class="menu">
            <img src="./assets/logo/chess-queen.svg" />
            <div class="large">체스</div>
          </div>
        </div>

        <div class="menu-bar">
          <div class="x-large bold">고민 해결</div>

          <div class="menu">
            <img src="./assets/logo/book.svg" />
            <div class="large">마법의 고민 해결 책</div>
          </div>

          <div class="menu">
            <img src="./assets/logo/palmtree.svg" />
            <div class="large">최고의 휴가</div>
          </div>

          <div class="menu">
            <img src="./assets/logo/cross.svg" />
            <div class="large">고해 성사</div>
          </div>
        </div>

        <div class="menu-bar">
          <div class="x-large bold">일하기</div>
          <div class="menu">
            <img src="./assets/logo/clock.svg" />
            <div class="large">뽀모도로</div>
          </div>
          <div class="menu">
            <img src="./assets/logo/fire-without-flare.svg" />
            <div class="large">일하기</div>
          </div>
        </div>

        <div class="menu-bar">
          <div class="x-large bold">설정</div>
          <div class="menu">
            <img src="./assets/logo/login.svg" />
            <div class="large">로그인</div>
          </div>
          <div class="menu">
            <img src="./assets/logo/gear.svg" />
            <div class="large">테마 설정</div>
          </div>
        </div>
      </div>

      <div id="content" style="justify-content: center; gap: 216px">
        <div id="service-tagline">
          <div class="tag-line bold">월급에 즐거움을 더하다.</div>
          <div class="xx-large text-align-center">당신만의 비밀 힐링 타임</div>
        </div>

        <div id="service-summary">
          <div class="x-large bold">월급 루팡은</div>
          <div class="large">
            바쁜 업무 속에서도 즐길 수 있는
            <span class="bold">비밀 힐링 타임</span>을 제공합니다.
          </div>
          <div class="large">
            미니게임과 고민 해결을 통해
            <span class="bold">일상 속 작은 즐거움</span>
            을 경험하세요.
          </div>
        </div>

        <div id="service-information">
          <div class="information-container">
            <div class="medium bold text-align-center">패치노트</div>
            <div>
              <div>Tistory Link & Notion Link</div>
            </div>
          </div>

          <div class="information-container">
            <div class="medium bold text-align-center">개발자</div>
            <div>
              <div>Github Link & Email</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
